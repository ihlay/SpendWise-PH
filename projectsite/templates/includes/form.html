{% for field in form %}
<div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
        <small class="form-text text-muted">{{ field.help_text }}</small>
    {% endif %}
    {% for error in field.errors %}
        <div class="text-danger small">{{ error }}</div>
    {% endfor %}
</div>
{% endfor %}
